<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odd One Out - Game</title>
<link rel="stylesheet" href="../CSS/Game_Style.css">
</head>

<body>

<a href="../index.html">
    <img src="../Images/Impostor_Mask.png" alt="Impostor Mask" class="chooselobby-mask">
</a>

<div class="game-box">

    <!-- ALWAYS VISIBLE HEADER -->
    <h1 id="phaseTitle">Loading Game...</h1>
    <h2 id="playerTurn"></h2>

    <!-- ROLE SCREEN (used by JS) -->
    <div id="roleReveal">
        <p>Game starting...</p>
    </div>

    <div id="roleText" class="hidden"></div>

    <button id="nextButton" class="hidden">Next</button>

    <!-- HINT PHASE -->
    <div id="hintPhase" class="hidden">
        <h2>Enter your hint</h2>

        <form id="hintForm">
            <input type="text" id="hint" placeholder="Type hint..." />
            <br><br>
            <button type="submit">Submit</button>
        </form>
    </div>

    <!-- VOTING PHASE -->
    <div id="votingPhase" class="hidden">
        <h2>Vote for the Impostor</h2>
        <div id="voteButtons"></div>
    </div>

    <!-- RESULT PHASE -->
    <div id="resultPhase" class="hidden">
        <h2 id="resultText"></h2>

        <button onclick="location.reload()">Play Again</button>
        <button onclick="location.href='../HTML/Host_Lobby.html'">Back to Lobby</button>
    </div>

</div>

<script src="../JS/Game_Script.js"></script>
</body>
</html>
